<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Complete - GameHub Pro</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="epic-page">

<div class="epic-shell">
    <main class="epic-main">

        <section class="checkout-success-wrap">
            <div class="checkout-success-card">
                <div class="checkout-success-icon">✓</div>
                <h1>Purchase Complete</h1>
                <p>Your order has been placed successfully.</p>

                <div class="checkout-success-total">
                    <span>Total Paid</span>
                    <strong th:text="'$' + ${#numbers.formatDecimal(finalTotal,1,2)}">$0.00</strong>
                </div>

                <div class="checkout-success-actions">
                    <a th:href="@{/library}" class="epic-white-btn">Go to Library</a>
                    <a th:href="@{/games}" class="epic-ghost-btn">Continue Shopping</a>
                </div>
            </div>
        </section>

    </main>
</div>

</body>
</html>
