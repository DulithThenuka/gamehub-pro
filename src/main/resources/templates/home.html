<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameHub Pro</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="epic-page">

<div class="epic-shell">

    <aside th:replace="fragments/sidebar :: sidebar('store', ${loggedUser})"></aside>

    <main class="epic-main">
        <header th:replace="fragments/topbar :: topbar('store', ${loggedUser}, 'Search store')"></header>

        <section class="store-hero" th:if="${featuredGames != null and !#lists.isEmpty(featuredGames)}">
            <div class="store-hero-main">
                <div class="store-hero-image">
                    <img th:src="${featuredGames[0].imageUrl}" th:alt="${featuredGames[0].title}">
                </div>

                <div class="store-hero-overlay">
                    <span class="store-hero-label">Available Now</span>
                    <h1 th:text="${featuredGames[0].title}">Featured Game</h1>
                    <p th:text="${featuredGames[0].description}">Description</p>

                    <div class="store-hero-price">
                        <span th:if="${featuredGames[0].discountPercent != null and featuredGames[0].discountPercent > 0}"
                              class="discount-pill"
                              th:text="'-' + ${featuredGames[0].discountPercent} + '%'">-20%</span>

                        <span class="hero-price-value"
                              th:text="${featuredGames[0].discountedPrice != null ? '$' + featuredGames[0].discountedPrice : '$' + featuredGames[0].price}">
                            $59.99
                        </span>
                    </div>

                    <div class="store-hero-actions">
                        <a th:href="@{'/games/' + ${featuredGames[0].id}}" class="hero-buy-btn">Buy Now</a>
                        <a th:href="@{/games}" class="hero-wish-btn">Browse</a>
                    </div>
                </div>
            </div>

            <div class="store-hero-side">
                <a class="store-side-item" th:each="game : ${featuredGames}" th:href="@{'/games/' + ${game.id}}">
                    <img th:src="${game.imageUrl}" th:alt="${game.title}">
                    <div>
                        <h4 th:text="${game.title}">Game</h4>
                        <span th:text="${game.genre}">Genre</span>
                    </div>
                </a>
            </div>
        </section>

        <section class="store-section" th:if="${topSellers != null and !#lists.isEmpty(topSellers)}">
            <div class="section-head">
                <h2>Top Sellers</h2>
            </div>

            <div class="epic-card-row">
                <article class="epic-game-card" th:each="game : ${topSellers}">
                    <a th:href="@{'/games/' + ${game.id}}" class="epic-game-thumb">
                        <img th:src="${game.imageUrl}" th:alt="${game.title}">
                    </a>

                    <div class="epic-game-meta">Base Game</div>
                    <h3>
                        <a th:href="@{'/games/' + ${game.id}}" th:text="${game.title}">Title</a>
                    </h3>

                    <div class="price-line">
                        <span th:if="${game.discountPercent != null and game.discountPercent > 0}"
                              class="discount-pill"
                              th:text="'-' + ${game.discountPercent} + '%'">-20%</span>

                        <span th:if="${game.discountPercent != null and game.discountPercent > 0}"
                              class="old-price"
                              th:text="'$' + ${game.price}">$59.99</span>

                        <span class="new-price"
                              th:text="${game.discountedPrice != null ? '$' + game.discountedPrice : '$' + game.price}">
                            $49.99
                        </span>
                    </div>
                </article>
            </div>
        </section>

        <section class="store-section" th:if="${newReleases != null and !#lists.isEmpty(newReleases)}">
            <div class="section-head">
                <h2>New Releases</h2>
            </div>

            <div class="epic-card-row">
                <article class="epic-wide-card" th:each="game : ${newReleases}">
                    <img th:src="${game.imageUrl}" th:alt="${game.title}">
                    <div class="epic-wide-content">
                        <h3 th:text="${game.title}">Title</h3>
                        <p th:text="${game.description}">Description</p>
                        <a th:href="@{'/games/' + ${game.id}}" class="news-secondary-btn">View Details</a>
                    </div>
                </article>
            </div>
        </section>

        <section class="store-section" th:if="${latestNews != null and !#lists.isEmpty(latestNews)}">
            <div class="section-head">
                <h2>Featured Stories</h2>
            </div>

            <div class="news-feature-row">
                <article class="news-feature-mini" th:each="item : ${latestNews}">
                    <img th:src="${item.imageUrl}" th:alt="${item.title}">
                    <div>
                        <span class="news-card-category" th:text="${item.category}">Update</span>
                        <h4 th:text="${item.title}">Title</h4>
                        <p th:text="${item.summary}">Summary</p>
                        <a th:href="@{'/news/' + ${item.id}}" class="news-read-link">Read more</a>
                    </div>
                </article>
            </div>
        </section>

        <div th:replace="fragments/footer :: body"></div>
    </main>
</div>

</body>
</html>
