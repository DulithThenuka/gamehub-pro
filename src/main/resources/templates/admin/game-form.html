<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${formTitle}">Game Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header class="navbar">
    <div class="logo">
        <a th:href="@{/}" class="logo-link">🎮 GameHub Pro Admin</a>
    </div>

    <nav class="nav-links">
        <a th:href="@{/admin}" class="active-link">Admin</a>
        <a th:href="@{/games}">Games</a>
        <a th:href="@{/logout}">Logout</a>
    </nav>
</header>

<section class="games-page">
    <div class="section-header">
        <p class="tag">ADMIN FORM</p>
        <h1 th:text="${formTitle}">Game Form</h1>
        <p class="section-text">Create or update game details.</p>
    </div>

    <div class="admin-form-wrap">
        <form th:action="@{${formAction}}" method="post" class="admin-form">
            <input type="hidden" name="id" th:value="${game.id}">

            <div class="auth-group">
                <label>Title</label>
                <input type="text" name="title" th:value="${game.title}" required>
            </div>

            <div class="auth-group">
                <label>Genre</label>
                <input type="text" name="genre" th:value="${game.genre}" required>
            </div>

            <div class="auth-group">
                <label>Platform</label>
                <input type="text" name="platform" th:value="${game.platform}" required>
            </div>

            <div class="auth-group">
                <label>Rating</label>
                <input type="number" step="0.1" min="0" max="5" name="rating" th:value="${game.rating}" required>
            </div>

            <div class="auth-group">
                <label>Image URL</label>
                <input type="text" name="imageUrl" th:value="${game.imageUrl}" required>
            </div>

            <div class="auth-group">
                <label>Trailer URL</label>
                <input type="text" name="trailerUrl" th:value="${game.trailerUrl}" required>
            </div>

            <div class="auth-group">
                <label>Description</label>
                <textarea name="description" rows="6" required th:text="${game.description}"></textarea>
            </div>

            <div class="admin-form-actions">
                <button type="submit" class="btn btn-primary">Save Game</button>
                <a th:href="@{/admin}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</section>

</body>
</html>
