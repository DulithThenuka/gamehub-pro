<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add News - GameHub Pro</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="epic-page">

<div class="epic-shell">

    <aside class="epic-sidebar">
        <div>
            <div class="epic-logo-wrap">
                <a th:href="@{/}" class="epic-logo">GH</a>
            </div>

            <nav class="epic-menu">
                <a th:href="@{/admin/news}" class="active">
                    <i class="bi bi-megaphone"></i>
                    <span>Add News</span>
                </a>
            </nav>
        </div>
    </aside>

    <main class="epic-main">
        <div class="profile-head">
            <div class="profile-label">ADMIN</div>
            <h1>Add News</h1>
            <p>Create a new news post for GameHub.</p>
        </div>

        <div class="admin-form-wrap">
            <form th:action="@{/admin/news/save}" method="post" class="admin-form">
                <input type="text" name="title" placeholder="News title" required>
                <input type="text" name="summary" placeholder="Short summary" required>
                <textarea name="content" rows="6" placeholder="Full content" required></textarea>
                <input type="text" name="imageUrl" placeholder="Image URL" required>
                <input type="text" name="category" placeholder="Category (Update, Launch, Esports...)" required>
                <input type="text" name="readTime" placeholder="Read time (ex: 5 min read)" required>

                <label style="display:flex; gap:10px; align-items:center; color:#fff;">
                    <input type="checkbox" name="featured">
                    Featured News
                </label>

                <div class="admin-form-actions">
                    <button type="submit" class="browse-card-btn primary">Save News</button>
                    <a th:href="@{/admin/news}" class="browse-card-btn secondary">Back</a>
                </div>
            </form>
        </div>
    </main>
</div>

</body>
</html>
