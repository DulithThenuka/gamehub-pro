<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GameHub Pro</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<section class="auth-page">
    <div class="auth-card">
        <a th:href="@{/}" class="auth-brand">🎮 GameHub Pro</a>
        <h1>Welcome Back</h1>
        <p class="auth-subtitle">Login to continue exploring your game world.</p>

        <div th:if="${param.error}" class="auth-message error-message">
            Invalid email or password.
        </div>

        <div th:if="${param.logout}" class="auth-message success-message">
            You logged out successfully.
        </div>

        <div th:if="${param.registered}" class="auth-message success-message">
            Registration successful. Please login.
        </div>

        <form th:action="@{/login}" method="post" class="auth-form">
            <div class="auth-group">
                <label>Email</label>
                <input type="email" name="username" placeholder="Enter your email" required>
            </div>

            <div class="auth-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary auth-btn">Login</button>
        </form>

        <p class="auth-switch">
            Don’t have an account?
            <a th:href="@{/register}">Create one</a>
        </p>
    </div>
</section>

</body>
</html>
