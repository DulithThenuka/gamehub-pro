<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library - GameHub Pro</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="epic-page">

<div class="epic-shell">

    <aside th:replace="fragments/sidebar :: sidebar('library', ${loggedUser})"></aside>

    <main class="epic-main">
        <header th:replace="fragments/topbar :: topbar('library', ${loggedUser}, 'Search library')"></header>

        <section class="section-head">
            <h2>Library</h2>
        </section>

        <div th:if="${libraryGames == null or #lists.isEmpty(libraryGames)}" class="empty-state-card">
            <h3>Your library is empty</h3>
            <p>Add games to favorites or purchases to build your collection.</p>
            <a th:href="@{/games}" class="news-primary-btn">Browse Games</a>
        </div>

        <div th:if="${libraryGames != null and !#lists.isEmpty(libraryGames)}" class="browse-grid">
            <article class="epic-game-card" th:each="game : ${libraryGames}">
                <a th:href="@{'/games/' + ${game.id}}" class="epic-game-thumb">
                    <img th:src="${game.imageUrl}" th:alt="${game.title}">
                </a>

                <div class="epic-game-meta" th:text="${game.genre}">Genre</div>
                <h3>
                    <a th:href="@{'/games/' + ${game.id}}" th:text="${game.title}">Title</a>
                </h3>
                <div class="epic-platform" th:text="${game.platform}">PC</div>

                <div class="library-actions">
                    <button type="button" class="news-secondary-btn install-btn">Install</button>
                    <a th:href="@{'/games/' + ${game.id}}" class="news-read-link">View details</a>
                </div>
            </article>
        </div>

        <div th:replace="fragments/footer :: body"></div>
    </main>
</div>

</body>
</html>
