<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">My Library</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header class="navbar">
    <div class="logo">
        <a th:href="@{/}" class="logo-link">🎮 GameHub Pro</a>
    </div>

    <nav class="nav-links">
    <a th:href="@{/}">Home</a>
    <a th:href="@{/games}">Games</a>
    <a th:href="@{/library}" class="active-link">My Library</a>
    <a th:href="@{/profile}">Profile</a>
    <a th:if="${loggedUser != null and loggedUser.role.name() == 'ADMIN'}" th:href="@{/admin}">Admin</a>
    <a th:href="@{/logout}">Logout</a>
    </nav>
</header>

<section class="games-page">
    <div class="section-header">
        <p class="tag">MY COLLECTION</p>
        <h1>Saved Favorite Games</h1>
        <p class="section-text">Your personal game library is here.</p>
    </div>

    <div class="games-grid" th:if="${not #lists.isEmpty(games)}">
        <div class="game-card" th:each="game : ${games}">
            <img th:src="${game.imageUrl}" th:alt="${game.title}">
            <div class="game-card-body">
                <div class="game-top">
                    <h3 th:text="${game.title}">Game Title</h3>
                    <span class="rating" th:text="${game.rating}">4.8</span>
                </div>

                <div class="meta-row">
                    <span th:text="${game.genre}">Genre</span>
                    <span th:text="${game.platform}">Platform</span>
                </div>

                <p th:text="${game.description}">Game description goes here.</p>

                <div class="library-actions">
                    <a th:href="@{'/games/' + ${game.id}}" class="btn btn-primary small-btn">View Details</a>

                    <form th:action="@{'/favorites/remove/' + ${game.id}}" method="post">
                        <button type="submit" class="btn btn-secondary small-btn">Remove</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="empty-state" th:if="${#lists.isEmpty(games)}">
        <h3>No favorite games yet</h3>
        <p>Start adding games to build your personal library.</p>
        <a th:href="@{/games}" class="btn btn-secondary">Browse Games</a>
    </div>
</section>

</body>
</html>
