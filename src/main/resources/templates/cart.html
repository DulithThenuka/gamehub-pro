<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart - GameHub Pro</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="epic-page">

<div class="epic-shell">

    <aside th:replace="fragments/sidebar :: sidebar('cart', ${loggedUser})"></aside>

    <main class="epic-main">
        <header th:replace="fragments/topbar :: topbar('cart', ${loggedUser}, 'Search cart')"></header>

        <section class="cart-page">
            <div class="section-head browse-head">
                <div>
                    <p class="section-kicker">Cart</p>
                    <h2>My Cart</h2>
                    <p class="section-subtext">Review your selected games before checkout.</p>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(cartItems)}" class="empty-state">
                <h3>Your cart is empty</h3>
                <p>Add games from the store to start your checkout.</p>
                <a th:href="@{/games}" class="epic-white-btn">Browse Games</a>
            </div>

            <div th:if="${!#lists.isEmpty(cartItems)}" class="cart-layout">
                <div class="cart-items-card">
                    <div class="cart-item" th:each="item : ${cartItems}">
                        <div class="cart-item-image">
                            <img th:src="${item.game.imageUrl != null and !#strings.isEmpty(item.game.imageUrl) ? item.game.imageUrl : '/images/game-placeholder.jpg'}"
                                 th:alt="${item.game.title}">
                        </div>

                        <div class="cart-item-content">
                            <h3 th:text="${item.game.title}">Game Title</h3>
                            <p class="text-soft" th:text="${item.game.genre}">Genre</p>
                            <p class="text-muted" th:text="${item.game.platform}">Platform</p>
                        </div>

                        <div class="cart-item-price">
                            <span class="new-price"
                                  th:text="${item.game.discountedPrice != null ? '$' + #numbers.formatDecimal(item.game.discountedPrice, 1, 2) : '$' + #numbers.formatDecimal(item.game.price, 1, 2)}">
                                $49.99
                            </span>
                        </div>

                        <div class="cart-item-actions">
                            <form th:action="@{'/cart/remove/' + ${item.id}}" method="post">
                                <button type="submit" class="epic-ghost-btn small-btn">
                                    <i class="bi bi-trash"></i>
                                    Remove
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

                <aside class="cart-summary-card">
                    <h3>Order Summary</h3>

                    <div class="summary-line">
                        <span>Subtotal</span>
                        <strong th:text="'$' + ${#numbers.formatDecimal(cartTotal, 1, 2)}">$0.00</strong>
                    </div>

                    <div class="summary-line">
                        <span>Discounts</span>
                        <strong th:text="'-$' + ${#numbers.formatDecimal(discountTotal, 1, 2)}">-$0.00</strong>
                    </div>

                    <div class="summary-line total-line">
                        <span>Total</span>
                        <strong th:text="'$' + ${#numbers.formatDecimal(finalTotal, 1, 2)}">$0.00</strong>
                    </div>

                    <form th:action="@{/checkout/complete}" method="post">
                        <button type="submit" class="epic-white-btn cart-checkout-btn">
                            <i class="bi bi-credit-card"></i>
                            Proceed to Checkout
                        </button>
                    </form>
                </aside>
            </div>
        </section>

        <div th:replace="fragments/footer :: body"></div>
    </main>
</div>

</body>
</html>
