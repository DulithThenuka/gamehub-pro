<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<footer class="epic-footer" th:fragment="body">
    <div class="footer-container">
        <div class="footer-grid">
            <div class="footer-col">
                <h4>Store</h4>
                <a th:href="@{/}">Discover</a>
                <a th:href="@{/games}">Browse Games</a>
                <a th:href="@{/news}">News</a>
            </div>

            <div class="footer-col">
                <h4>Library</h4>
                <a th:href="@{/library}">My Library</a>
                <a th:href="@{/wishlist}">Wishlist</a>
                <a th:href="@{/cart}">Cart</a>
            </div>

            <div class="footer-col">
                <h4>Account</h4>
                <a th:href="@{/login}">Login</a>
                <a th:href="@{/register}">Register</a>
                <a th:href="@{/profile}">Profile</a>
            </div>

            <div class="footer-col">
                <h4>GameHub</h4>
                <a th:href="@{/}">Home</a>
                <a th:href="@{/games}">Storefront</a>
                <a th:href="@{/news}">Latest Updates</a>
            </div>
        </div>

        <div class="footer-divider"></div>

        <div class="footer-bottom">
            <p>© 2026 GameHub Pro. Built with Spring Boot and Thymeleaf.</p>
            <button type="button" class="back-to-top" onclick="window.scrollTo({top:0, behavior:'smooth'})">
                Back to top
            </button>
        </div>
    </div>
</footer>

</body>
</html>
