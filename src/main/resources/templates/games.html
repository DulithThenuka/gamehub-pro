<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Games - GameHub Pro</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="epic-page">

<div class="epic-shell">

    <aside th:replace="fragments/sidebar :: sidebar('games', ${loggedUser})"></aside>

    <main class="epic-main">
        <header th:replace="fragments/topbar :: topbar('games', ${loggedUser}, 'Search games')"></header>

        <div class="browse-layout">
            <section class="browse-main">
                <div class="section-head browse-head">
                    <div>
                        <p class="section-kicker">Store</p>
                        <h2>Browse Games</h2>
                        <p class="section-subtext">Find your next favorite title by genre, platform, and price.</p>
                    </div>

                    <div class="browse-topbar">
                        <div class="browse-sort">Sort by: <strong>Featured</strong></div>
                    </div>
                </div>

                <div th:if="${games == null or #lists.isEmpty(games)}" class="empty-state">
                    <h3>No games found</h3>
                    <p>Try changing your search or filter options.</p>
                    <a th:href="@{/games}" class="epic-white-btn">
                        <i class="bi bi-arrow-clockwise"></i>
                        Reset Filters
                    </a>
                </div>

                <div th:if="${games != null and !#lists.isEmpty(games)}" class="browse-grid">
                    <article class="epic-game-card" th:each="game : ${games}">
                        <a th:href="@{'/games/' + ${game.id}}" class="epic-game-thumb">
                            <img th:src="${game.imageUrl != null and !#strings.isEmpty(game.imageUrl) ? game.imageUrl : '/images/game-placeholder.jpg'}"
                                 th:alt="${game.title}">
                        </a>

                        <div class="epic-game-meta" th:text="${game.genre != null ? game.genre : 'Unknown Genre'}">Genre</div>

                        <h3>
                            <a th:href="@{'/games/' + ${game.id}}" th:text="${game.title}">Title</a>
                        </h3>

                        <div class="epic-platform" th:text="${game.platform != null ? game.platform : 'Platform N/A'}">PC</div>

                        <div class="price-line">
                            <span th:if="${game.discountPercent != null and game.discountPercent > 0}"
                                  class="discount-pill"
                                  th:text="'-' + ${game.discountPercent} + '%'">-20%</span>

                            <span th:if="${game.discountPercent != null and game.discountPercent > 0 and game.price != null}"
                                  class="old-price"
                                  th:text="'$' + ${#numbers.formatDecimal(game.price, 1, 2)}">$59.99</span>

                            <span class="new-price"
                                  th:text="${game.discountedPrice != null ? '$' + #numbers.formatDecimal(game.discountedPrice, 1, 2) : (game.price != null ? '$' + #numbers.formatDecimal(game.price, 1, 2) : 'Free')}">
                                $49.99
                            </span>
                        </div>
                    </article>
                </div>
            </section>

            <aside class="browse-filters">
                <div class="filters-card">
                    <h3>Filters</h3>

                    <form th:action="@{/games}" method="get" class="filters-form">
                        <input type="text" name="search" placeholder="Search title" th:value="${search}">

                        <select name="genre">
                            <option value="">All Genres</option>
                            <option th:each="item : ${genres}"
                                    th:value="${item}"
                                    th:text="${item}"
                                    th:selected="${selectedGenre == item}">
                                Genre
                            </option>
                        </select>

                        <select name="platform">
                            <option value="">All Platforms</option>
                            <option th:each="item : ${platforms}"
                                    th:value="${item}"
                                    th:text="${item}"
                                    th:selected="${selectedPlatform == item}">
                                Platform
                            </option>
                        </select>

                        <button type="submit" class="news-primary-btn filters-btn">
                            <i class="bi bi-funnel"></i>
                            Apply Filters
                        </button>

                        <a th:href="@{/games}" class="epic-ghost-btn" style="text-align:center;">
                            <i class="bi bi-arrow-counterclockwise"></i>
                            Clear Filters
                        </a>
                    </form>
                </div>
            </aside>
        </div>

        <div th:replace="fragments/footer :: body"></div>
    </main>
</div>

</body>
</html>
