<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gifts - GameHub Pro</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="epic-page">

<div class="epic-shell">

    <!-- SIDEBAR -->
    <aside class="epic-sidebar">
        <div>
            <div class="epic-logo-wrap">
                <a th:href="@{/}" class="epic-logo">GH</a>
            </div>

            <nav class="epic-menu">
                <a th:href="@{/}">
                    <i class="bi bi-bag"></i>
                    <span>Store</span>
                </a>

                <a th:if="${loggedUser != null}" th:href="@{/library}">
                    <i class="bi bi-collection"></i>
                    <span>Library</span>
                </a>

                <a th:href="@{/games}">
                    <i class="bi bi-grid"></i>
                    <span>Browse</span>
                </a>

                <a th:href="@{/gifts}" class="active">
                    <i class="bi bi-gift"></i>
                    <span>Gifts</span>
                </a>

                <a th:if="${loggedUser != null}" th:href="@{/favorites}">
                    <i class="bi bi-heart"></i>
                    <span>Wishlist</span>
                </a>

                <a th:if="${loggedUser != null}" th:href="@{/profile}">
                    <i class="bi bi-person"></i>
                    <span>Profile</span>
                </a>

                <a th:if="${loggedUser != null and loggedUser.role.name() == 'ADMIN'}" th:href="@{/admin}">
                    <i class="bi bi-speedometer2"></i>
                    <span>Admin</span>
                </a>
            </nav>
        </div>

        <div class="epic-sidebar-bottom">
            <a th:if="${loggedUser == null}" th:href="@{/login}" class="epic-side-btn">Login</a>
            <a th:if="${loggedUser == null}" th:href="@{/register}" class="epic-side-btn secondary">Register</a>
            <a th:if="${loggedUser != null}" th:href="@{/logout}" class="epic-side-btn">Logout</a>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="epic-main">

        <!-- TOP BAR -->
        <header class="epic-topbar">
            <div class="epic-top-left">
                <a th:href="@{/games}" class="epic-icon-btn">
                    <i class="bi bi-chevron-left"></i>
                </a>

                <div class="epic-search">
                    <i class="bi bi-search"></i>
                    <input type="text" placeholder="Search store">
                </div>

                <nav class="epic-top-links">
                    <a th:href="@{/}">Discover</a>
                    <a th:href="@{/games}">Browse</a>
                    <a th:href="@{/gifts}" class="active">Gifts</a>
                </nav>
            </div>

            <div class="epic-top-right">

                <a th:href="@{/favorites}"
                   class="epic-icon-nav">
                    <div class="epic-icon-btn" title="Wishlist">
                        <i class="bi bi-bookmark"></i>
                    </div>
                </a>

                <a th:href="@{/gifts}"
                   class="epic-icon-nav active">
                    <div class="epic-icon-btn" title="Gifts">
                        <i class="bi bi-gift"></i>
                    </div>
                </a>

                <a th:href="@{/cart}"
                   class="epic-icon-nav">
                    <div class="epic-icon-btn" title="Cart">
                        <i class="bi bi-cart3"></i>
                    </div>
                </a>

                <div class="epic-profile-dropdown" th:if="${loggedUser != null}">
                    <button class="epic-profile-trigger epic-icon-nav"
                            type="button"
                            id="profileDropdownBtn">
                        <div class="epic-user-circle"
                             th:text="${#strings.substring(loggedUser.fullName,0,1)}">U</div>
                    </button>

                    <div class="epic-profile-menu" id="profileDropdownMenu">
                        <div class="epic-profile-menu-head">
                            <strong th:text="${loggedUser.fullName}">User Name</strong>
                            <span th:text="${loggedUser.email}">user@email.com</span>
                        </div>

                        <a th:href="@{/profile}">
                            <i class="bi bi-person"></i>
                            My Profile
                        </a>

                        <a th:href="@{/library}">
                            <i class="bi bi-collection"></i>
                            My Library
                        </a>

                        <a th:href="@{/favorites}">
                            <i class="bi bi-heart"></i>
                            Wishlist
                        </a>

                        <a th:href="@{/cart}">
                            <i class="bi bi-cart3"></i>
                            Cart
                        </a>

                        <a th:href="@{/gifts}">
                            <i class="bi bi-gift"></i>
                            Gifts
                        </a>

                        <a th:if="${loggedUser.role.name() == 'ADMIN'}" th:href="@{/admin}">
                            <i class="bi bi-speedometer2"></i>
                            Admin Dashboard
                        </a>

                        <a th:href="@{/logout}" class="logout-link">
                            <i class="bi bi-box-arrow-right"></i>
                            Logout
                        </a>
                    </div>
                </div>

                <a th:if="${loggedUser == null}" th:href="@{/login}" class="epic-user-chip guest-chip">
                    <div class="epic-user-circle">G</div>
                    <span>Guest</span>
                </a>

            </div>
        </header>

        <!-- PAGE HEAD -->
        <section class="gifts-page-head">
            <h1>Gifts</h1>

            <div class="gifts-tabs">
                <button class="gifts-tab active" type="button">All</button>
                <button class="gifts-tab" type="button">Unopened</button>
                <button class="gifts-tab" type="button">Received</button>
                <button class="gifts-tab" type="button">Sent</button>
            </div>
        </section>

        <!-- EMPTY STATE -->
        <section class="gifts-empty-state">
            <div class="gifts-empty-card">
                <i class="bi bi-gift"></i>
                <h2>No Received or Sent Gifts</h2>
                <p>Games gifted to you will show up here.</p>
                <a th:href="@{/games}" class="gifts-browse-btn">Browse Games</a>
            </div>
        </section>

    </main>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
